name: libya-tradenet
services:
  - name: web
    source_dir: /
    github:
      repo: MalekNafaa/Libya-TradeNet
      branch: main
      deploy_on_push: true
    build_command: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    run_command: gunicorn libya_tradenet.wsgi:application --bind 0.0.0.0:$PORT
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: libya_tradenet.settings_production
      - key: SECRET_KEY
        type: SECRET
      - key: DATABASE_URL
        type: SECRET
      - key: ALLOWED_HOSTS
        value: ${APP_DOMAIN}
    static_sites:
      - name: static
        source_dir: staticfiles
        output_dir: /
