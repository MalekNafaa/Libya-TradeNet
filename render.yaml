services:
  - type: web
    name: libya-tradenet
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: gunicorn libya_tradenet.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: DATABASE_URL
        fromDatabase:
          name: libya-tradenet-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: libya_tradenet.settings
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost 127.0.0.1"
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          name: libya-tradenet
          type: web
          property: host
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "Libya TradeNet <malekplayer@gmail.com>"
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: libya-tradenet-db
    plan: free
    databaseName: libya_tradenet
    user: libya_tradenet
