services:
  - type: web
    name: libya-tradenet
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn libya_tradenet.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: libya-tradenet-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: libya_tradenet.settings_production
      - key: WEB_CONCURRENCY
        value: 4

databases:
  - name: libya-tradenet-db
    plan: free
    databaseName: libya_tradenet
    user: libya_tradenet
