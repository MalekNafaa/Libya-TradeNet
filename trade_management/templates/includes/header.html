{% load static %}
{% load i18n %}
<div class="header">

      <!-- 🔹 Top Bar -->
      <div class="top-bar">
        <div class="left">
          <!-- Language Switcher -->
          <div class="language-switcher" style="display: inline-block; margin-right: 15px;">
            <a href="{% url 'set_language' 'en' %}" style="{% if LANGUAGE_CODE == 'en' %}font-weight: bold; color: #667eea;{% endif %} margin-right: 8px;">English</a>
            <span>|</span>
            <a href="{% url 'set_language' 'ar' %}" style="{% if LANGUAGE_CODE == 'ar' %}font-weight: bold; color: #667eea;{% endif %} margin-left: 8px;">العربية</a>
          </div>
        </div>

        <div class="right">
          <span>Lorem</span>
          <span>Ipsum</span>
          <span>Dolor</span>
          <span>Contact</span>
        </div>
      </div>

      <!-- 🔹 Navbar -->
      <div class="navbar">
        <div class="logo">
          <img src="{% static 'image/LNT-svg.svg' %}" alt="Libya TradeNet">
        </div>

        <div class="menu">
          <a href="{% url 'login' %}">Companies</a>
          <span>Ipsum</span>
          <span>Dolor</span>
          <span>Reports</span>
          <span>Policies</span>
        </div>
      </div>

      <!-- 🔹 Hero Section -->
      <div class="hero">
        <div class="hero-text">
          <h1>Libya Trade Management System</h1>
          <p>
            Comprehensive trade management platform for Libya's import/export operations,
            providing seamless tracking and reporting capabilities.
          </p>

          <div class="search-box">
            <input type="text" placeholder="Search..." />
            <button>🔍</button>
          </div>
        </div>
      </div>

    </div>
