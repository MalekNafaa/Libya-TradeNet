<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; padding: 0; background: #f4f6f9; font-family: Arial, sans-serif; color: #333; }
  .wrapper { max-width: 600px; margin: 32px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .header { background: #1a3a5c; padding: 28px 32px; text-align: center; }
  .header img { height: 40px; }
  .header h1 { color: #fff; margin: 8px 0 0; font-size: 20px; letter-spacing: 0.5px; }
  .body { padding: 32px; }
  .badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-bottom: 20px; }
  .badge-success { background: #d4edda; color: #155724; }
  .badge-danger  { background: #f8d7da; color: #721c24; }
  .badge-info    { background: #d1ecf1; color: #0c5460; }
  .detail-box { background: #f8f9fa; border-left: 4px solid #1a3a5c; border-radius: 4px; padding: 16px 20px; margin: 20px 0; }
  .detail-box table { width: 100%; border-collapse: collapse; }
  .detail-box td { padding: 5px 0; font-size: 14px; }
  .detail-box td:first-child { color: #666; width: 45%; }
  .detail-box td:last-child { font-weight: bold; }
  .btn { display: inline-block; padding: 12px 28px; background: #1a3a5c; color: #fff !important; text-decoration: none; border-radius: 5px; font-size: 14px; margin-top: 20px; }
  .footer { background: #f8f9fa; padding: 20px 32px; text-align: center; font-size: 12px; color: #888; border-top: 1px solid #eee; }
  .note { font-size: 13px; color: #666; margin-top: 16px; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>🌍 Libya TradeNet</h1>
  </div>
  <div class="body">
    {% block body %}{% endblock %}
  </div>
  <div class="footer">
    <p>This is an automated message from Libya TradeNet. Please do not reply to this email.</p>
    <p>© 2025 Libya TradeNet — Ministry of Trade &amp; Economy</p>
  </div>
</div>
</body>
</html>
